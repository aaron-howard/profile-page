rules:
  - id: no-log-email-recipient
    message: Avoid logging email addresses or message bodies (PII). Use structured logs without recipient content.
    severity: WARNING
    languages:
      - typescript
    paths:
      include:
        - src/routes/
        - src/lib/server/
      exclude:
        - src/lib/server/email.ts
    patterns:
      - pattern-either:
          - pattern: console.$METHOD('To:', ...)
          - pattern: console.$METHOD('Body:', ...)
          - pattern: console.$METHOD('Subject:', ...)

  - id: no-unsafe-html-in-svelte
    message: '{@html ...} can cause XSS — sanitize with escapeHtml() or sanitizeHtml() before rendering user content.'
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - src/**/*.svelte
    pattern: '{@html'
